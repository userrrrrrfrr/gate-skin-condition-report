<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>העלאת צילומים</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      background: #121212;
      color: #000;
      padding: 20px;
    }

    .box {
      background: #dddddd; /* עוד טיפה כהה */
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #111;
    }

    iframe {
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="title">צילום גב</div>
    <iframe width="250" height="54" frameborder="0"
      src="https://mega.nz/filerequest#!n1Xtc_kgzmM!l!en"></iframe>
  </div>

  <div class="box">
    <div class="title">צילום חזה</div>
    <iframe width="250" height="54" frameborder="0"
      src="https://mega.nz/filerequest#!MDCz74SrSic!l!en"></iframe>
  </div>

  <div class="box">
    <div class="title">צילום ירך ימין</div>
    <iframe width="250" height="54" frameborder="0"
      src="https://mega.nz/filerequest#!pr7khCuzv_A!l!en"></iframe>
  </div>

</body>
</html>
